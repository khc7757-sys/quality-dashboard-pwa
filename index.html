<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>품질현황 현장등록</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1646a3">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="품질현황">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --ink: #142033;
      --muted: #667085;
      --line: #d7deea;
      --blue: #1749a6;
      --blue2: #1d4ed8;
      --green: #047857;
      --red: #b42318;
      --orange: #b45309;
      --shadow: 0 10px 24px rgba(16, 24, 40, .08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-text-size-adjust: 100%;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(135deg, #143b8f, #0b1d88);
      color: #fff;
      padding: calc(14px + env(safe-area-inset-top)) 16px 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,.16);
    }
    .head-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
      margin: 0;
      line-height: 1.2;
    }
    .head-sub {
      font-size: 12px;
      opacity: .85;
      margin-top: 5px;
    }
    .wrap {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      padding: 14px 12px 90px;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: #1f2937;
      border-radius: 999px;
      padding: 12px 10px;
      font-weight: 800;
      font-size: 15px;
      box-shadow: 0 2px 8px rgba(16,24,40,.05);
    }
    .tab.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 12px;
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }
    .panel h3 {
      margin: 12px 0 8px;
      font-size: 15px;
    }
    .status {
      border: 1px solid #b7e4cc;
      background: #ecfdf3;
      color: #075e3b;
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      margin: 8px 0 12px;
      overflow-wrap: anywhere;
    }
    .status.warn {
      border-color: #fed7aa;
      background: #fff7ed;
      color: #9a3412;
    }
    .status.err {
      border-color: #fecaca;
      background: #fef2f2;
      color: #991b1b;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 900;
      background: #e7edf7;
      color: #172033;
      min-height: 46px;
    }
    button.primary { background: var(--blue2); color: #fff; }
    button.green { background: var(--green); color: #fff; }
    button.red { background: #fee4e2; color: var(--red); }
    button.ghost { background: #fff; border: 1px solid var(--line); }
    button:disabled { opacity: .55; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .kpi {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      min-height: 92px;
    }
    .kpi .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .kpi .num {
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
    }
    .kpi.redish { background: #fff1f1; border-color: #fecaca; }
    .kpi.greenish { background: #ecfdf3; border-color: #bbf7d0; }
    .kpi.blueish { background: #eff6ff; border-color: #bfdbfe; }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 900;
      color: #344054;
      margin-bottom: 6px;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      padding: 13px 12px;
      font-size: 16px;
      outline: none;
    }
    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.45;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue2);
      box-shadow: 0 0 0 3px rgba(29,78,216,.12);
    }
    .type-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .type-btn {
      background: #fff;
      border: 1px solid var(--line);
    }
    .type-btn.active {
      color: #fff;
      background: var(--blue2);
      border-color: var(--blue2);
    }
    .search-results {
      display: none;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      max-height: 260px;
      overflow: auto;
      margin-top: 8px;
    }
    .result {
      padding: 12px;
      border-bottom: 1px solid #edf1f7;
    }
    .result:last-child { border-bottom: 0; }
    .result .pn {
      font-size: 15px;
      font-weight: 900;
    }
    .result .desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .selected-box {
      display: none;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      margin: 8px 0 12px;
      font-size: 14px;
      line-height: 1.45;
    }
    .selected-box strong { display: block; font-size: 15px; }
    .photo-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .hidden-file {
      display: none;
    }
    .previews {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .thumb {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      aspect-ratio: 1 / 1;
      background: #eef2f7;
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb button {
      position: absolute;
      right: 4px;
      top: 4px;
      min-height: 0;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(0,0,0,.6);
      color: #fff;
      font-size: 12px;
    }
    .list {
      display: grid;
      gap: 8px;
    }
    .defect-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      background: #fff;
      line-height: 1.45;
    }
    .defect-card .top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }
    .defect-card .title {
      font-weight: 900;
      font-size: 15px;
    }
    .defect-card .meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 900;
      background: #eef2ff;
      color: #3730a3;
      white-space: nowrap;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 30px 12px;
      font-size: 14px;
    }
    .help {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 6px;
    }
    .fixed-bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,.95);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(10px);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      z-index: 30;
    }
    .fixed-bottom .inner {
      max-width: 720px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .hidden { display: none !important; }
    @media (max-width: 360px) {
      .grid { grid-template-columns: 1fr; }
      .photo-actions { grid-template-columns: 1fr; }
      .fixed-bottom .inner { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<header>
  <h1 class="head-title">품질현황 현장등록</h1>
  <div class="head-sub">휴대폰 전용 · 조회 / 불량 등록 / 사진 첨부</div>
</header>

<div class="wrap">
  <div class="tabs">
    <button id="tabDash" class="tab active" type="button">불량현황</button>
    <button id="tabReg" class="tab" type="button">불량등록</button>
  </div>

  <div id="status" class="status warn">구글시트 연결 준비 중...</div>

  <section id="dashPanel">
    <div class="panel">
      <h2>불량현황</h2>
      <div class="actions">
        <button id="refreshBtn" class="primary" type="button">구글시트 새로고침</button>
      </div>
      <div class="grid">
        <div class="kpi redish"><div class="label">전체 불량</div><div id="kTotal" class="num">0</div></div>
        <div class="kpi greenish"><div class="label">사내 불량</div><div id="kInternal" class="num">0</div></div>
        <div class="kpi blueish"><div class="label">외주 불량</div><div id="kExternal" class="num">0</div></div>
        <div class="kpi"><div class="label">품번 기준</div><div id="kParts" class="num">0</div></div>
      </div>
    </div>

    <div class="panel">
      <h2>최근 불량 이력</h2>
      <div id="recentList" class="list"><div class="empty">데이터 없음</div></div>
    </div>
  </section>

  <section id="regPanel" class="hidden">
    <div class="panel">
      <h2>불량 이력 등록</h2>

      <div class="field">
        <label>불량 구분</label>
        <div class="type-row">
          <button id="kindInternal" class="type-btn active" type="button">사내불량</button>
          <button id="kindExternal" class="type-btn" type="button">외주불량</button>
        </div>
      </div>

      <div class="field">
        <label for="partSearch">품번 / 품명 검색</label>
        <input id="partSearch" type="search" autocomplete="off" placeholder="품번 또는 품명을 입력하세요">
        <div id="selectedPart" class="selected-box"></div>
        <div id="searchResults" class="search-results"></div>
        <div class="help">검색 후 품번을 선택하세요. 검색 결과가 없으면 품번/품명을 직접 입력할 수 있습니다.</div>
      </div>

      <div class="field">
        <label for="partNo">품번 <span style="color:#b42318">*</span></label>
        <input id="partNo" type="text" placeholder="품번">
      </div>

      <div class="field">
        <label for="itemName">품명</label>
        <input id="itemName" type="text" placeholder="품명">
      </div>

      <div class="field" id="processField">
        <label for="processName">공정</label>
        <input id="processName" type="text" placeholder="예: 조립, 검사, 포장">
      </div>

      <div class="field hidden" id="supplierField">
        <label for="supplier">외주업체</label>
        <input id="supplier" type="text" placeholder="업체명">
      </div>

      <div class="field">
        <label for="date">발생일자 <span style="color:#b42318">*</span></label>
        <input id="date" type="date">
      </div>

      <div class="field">
        <label for="worker">작업자 / 등록자 <span style="color:#b42318">*</span></label>
        <input id="worker" type="text" placeholder="작업자 또는 등록자">
      </div>

      <div class="field">
        <label for="qty">수량 <span style="color:#b42318">*</span></label>
        <input id="qty" type="number" inputmode="numeric" min="1" value="1">
      </div>

      <div class="field">
        <label for="defectText">불량내용 <span style="color:#b42318">*</span></label>
        <textarea id="defectText" placeholder="불량 내용을 입력하세요"></textarea>
      </div>

      <div class="field">
        <label for="cause">원인</label>
        <textarea id="cause" placeholder="확인된 원인이 있으면 입력하세요"></textarea>
      </div>

      <div class="field">
        <label for="countermeasure">대책 / 조치내용</label>
        <textarea id="countermeasure" placeholder="임시조치 또는 개선대책"></textarea>
      </div>

      <div class="field">
        <label>사진 첨부</label>
        <div class="photo-actions">
          <button id="cameraBtn" class="ghost" type="button">사진 촬영</button>
          <button id="galleryBtn" class="ghost" type="button">사진 선택</button>
        </div>
        <input id="cameraInput" class="hidden-file" type="file" accept="image/*" capture="environment">
        <input id="galleryInput" class="hidden-file" type="file" accept="image/*" multiple>
        <div class="help">최대 3장까지 첨부합니다. 저장 시 Google Drive에 업로드됩니다.</div>
        <div id="previews" class="previews"></div>
      </div>

      <div class="actions">
        <button id="submitBtn" class="green" type="button">불량 등록</button>
        <button id="resetBtn" class="red" type="button">입력 초기화</button>
      </div>
    </div>
  </section>
</div>

<div class="fixed-bottom">
  <div class="inner">
    <button id="bottomDash" class="ghost" type="button">현황 보기</button>
    <button id="bottomReg" class="primary" type="button">불량 등록</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby06iR8lCdoWDbtKBe-IXQNdmRlQ0x_-6aoiJXlBlRqu8RvepfK8FJ7Fc3D3-5pFtIu_w/exec";
const $ = (id) => document.getElementById(id);

const state = {
  data: null,
  kind: 'internal',
  masterRows: [],
  internalRows: [],
  externalRows: [],
  selectedPart: null,
  photos: []
};

function setStatus(msg, type) {
  const el = $('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

function todayYmd() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function pickFirst(row, keys) {
  if (!row) return '';
  for (const k of keys) {
    if (row[k] !== undefined && row[k] !== null && String(row[k]).trim() !== '') return String(row[k]).trim();
  }
  const norm = s => String(s||'').normalize('NFKC').trim().toLowerCase().replace(/[\s\-_.\/\\()[\]{}:]+/g,'');
  const wanted = new Set(keys.map(norm));
  for (const realKey of Object.keys(row)) {
    if (wanted.has(norm(realKey)) && row[realKey] !== undefined && row[realKey] !== null && String(row[realKey]).trim() !== '') {
      return String(row[realKey]).trim();
    }
  }
  return '';
}

function normalizeInternalRow(row, i) {
  return {
    kind: 'internal',
    rowId: row.rowId || row._id || 'I-' + i,
    partNo: pickFirst(row, ['partNo','품번','품목번호','품목코드','PART NO','Part No','도번','도면번호']),
    itemName: pickFirst(row, ['itemName','품명','품목명','PART NAME','Part Name','name']),
    modelName: pickFirst(row, ['modelName','모델명','모델','MODEL','Model']),
    processName: pickFirst(row, ['processName','공정명','공정','PROCESS','Process','발견공정']),
    partGroup: pickFirst(row, ['partGroup','파트명','파트','PART','Part']),
    supplier: ''
  };
}

function normalizeExternalRow(row, i) {
  return {
    kind: 'external',
    rowId: row.rowId || row._id || 'E-' + i,
    partNo: pickFirst(row, ['partNo','품번','품목번호','품목코드','PART NO','Part No','도번','도면번호']),
    itemName: pickFirst(row, ['itemName','품명','품목명','PART NAME','Part Name','name']),
    modelName: pickFirst(row, ['modelName','모델명','모델','MODEL','Model']),
    processName: '',
    partGroup: '',
    supplier: pickFirst(row, ['supplier','vendor','업체명','업체','거래처','외주업체','협력사'])
  };
}


function normalizeGenericPartRow(row, i, kind) {
  row = row && typeof row === 'object' ? row : {};
  const out = {
    kind: kind || '',
    rowId: row.rowId || row._id || row.id || ('G-' + i),
    partNo: pickFirst(row, ['partNo','품번','품목번호','품목코드','PART NO','Part No','도번','도면번호','품목','code','itemCode']),
    itemName: pickFirst(row, ['itemName','품명','품목명','PART NAME','Part Name','name','item','description','desc']),
    modelName: pickFirst(row, ['modelName','모델명','모델','MODEL','Model']),
    processName: pickFirst(row, ['processName','공정명','공정','PROCESS','Process','발견공정','공정구분']),
    partGroup: pickFirst(row, ['partGroup','파트명','파트','PART','Part','분류','구분']),
    supplier: pickFirst(row, ['supplier','vendor','업체명','업체','거래처','외주업체','협력사'])
  };
  if (!out.kind) out.kind = out.supplier ? 'external' : 'internal';
  return out;
}

function pushUniquePart(map, row) {
  if (!row || (!row.partNo && !row.itemName)) return;
  const key = [
    row.kind || '',
    row.partNo || '',
    row.itemName || '',
    row.processName || '',
    row.supplier || ''
  ].join('|').toLowerCase();
  if (!map[key]) map[key] = row;
}

function collectRowsDeep(value, out, depth) {
  if (depth > 4 || value == null) return;
  if (Array.isArray(value)) {
    value.forEach(v => collectRowsDeep(v, out, depth + 1));
    return;
  }
  if (typeof value === 'object') {
    const row = normalizeGenericPartRow(value, out.length, '');
    if (row.partNo || row.itemName) {
      out.push(value);
    }
    Object.keys(value).forEach(k => {
      const v = value[k];
      if (Array.isArray(v) || (v && typeof v === 'object')) collectRowsDeep(v, out, depth + 1);
    });
  }
}

function rebuildPartSearchIndex() {
  const data = state.data || {};
  const md = data.masterData || {};
  const unique = {};

  const externalBase = Array.isArray(md.externalBaseRows) ? md.externalBaseRows : [];
  const internalBase = Array.isArray(md.internalBaseRows) ? md.internalBaseRows : [];

  externalBase.map(normalizeExternalRow).forEach(r => pushUniquePart(unique, r));
  internalBase.map(normalizeInternalRow).forEach(r => pushUniquePart(unique, r));

  // keys 안에 들어 있는 기준정보 배열도 폭넓게 검색 인덱스에 포함
  const keys = data.keys || {};
  Object.keys(keys).forEach(key => {
    const parsed = safeJson(keys[key], null);
    if (!parsed) return;

    const lowered = key.toLowerCase();
    const guessedKind =
      lowered.includes('external') || lowered.includes('vendor') || lowered.includes('supplier') || key.includes('외주') || key.includes('업체')
        ? 'external'
        : lowered.includes('internal') || key.includes('사내')
          ? 'internal'
          : '';

    if (Array.isArray(parsed)) {
      parsed.map((x, i) => normalizeGenericPartRow(x, i, guessedKind)).forEach(r => pushUniquePart(unique, r));
    } else if (typeof parsed === 'object') {
      const rows = [];
      collectRowsDeep(parsed, rows, 0);
      rows.map((x, i) => normalizeGenericPartRow(x, i, guessedKind)).forEach(r => pushUniquePart(unique, r));
    }
  });

  // 이미 등록된 불량 이력에 있는 품번도 검색 후보에 포함
  safeArrayKey(data, 'internalDefects.v1').forEach((d, i) => {
    pushUniquePart(unique, normalizeGenericPartRow(d, i, 'internal'));
  });

  const extObj = safeObjectKey(data, 'partSearch.defectHistories.v1');
  Object.keys(extObj || {}).forEach(partNo => {
    const list = extObj[partNo];
    if (!Array.isArray(list)) return;
    list.forEach((d, i) => {
      const row = Object.assign({}, d, { partNo: d.partNo || partNo });
      pushUniquePart(unique, normalizeGenericPartRow(row, i, 'external'));
    });
  });

  const allRows = Object.keys(unique).map(k => unique[k]);
  state.internalRows = allRows.filter(r => r.kind !== 'external');
  state.externalRows = allRows.filter(r => r.kind === 'external');
  state.masterRows = allRows;
}


function safeJson(txt, fallback) {
  try { return txt ? JSON.parse(String(txt)) : fallback; } catch(e) { return fallback; }
}

function safeArrayKey(data, key) {
  return safeJson(data && data.keys ? data.keys[key] : '', []);
}

function safeObjectKey(data, key) {
  return safeJson(data && data.keys ? data.keys[key] : '', {});
}

function externalCount(data) {
  const obj = safeObjectKey(data, 'partSearch.defectHistories.v1');
  let n = 0;
  Object.keys(obj || {}).forEach(k => {
    if (Array.isArray(obj[k])) n += obj[k].length;
  });
  return n;
}

function allDefects(data) {
  const internal = safeArrayKey(data, 'internalDefects.v1').map(x => Object.assign({}, x, {_kind:'사내'}));
  const extObj = safeObjectKey(data, 'partSearch.defectHistories.v1');
  const external = [];
  Object.keys(extObj || {}).forEach(partNo => {
    const list = extObj[partNo];
    if (Array.isArray(list)) {
      list.forEach(x => external.push(Object.assign({}, x, {_kind:'외주', partNo: x.partNo || partNo})));
    }
  });
  return internal.concat(external).sort((a,b) => String(b.updatedAt || b.createdAt || b.date || '').localeCompare(String(a.updatedAt || a.createdAt || a.date || '')));
}

async function callGoogleSheet(action, payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    mode: 'cors',
    headers: {'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({ action, payload, clientVersion:'mobile-field-v1', sentAt:new Date().toISOString() })
  });
  const text = await res.text();
  let out;
  try { out = JSON.parse(text); } catch(e) {
    throw new Error('Apps Script 응답 오류: ' + text.slice(0, 180));
  }
  if (!out.ok) throw new Error(out.error || '구글시트 처리 실패');
  return out;
}

async function loadAll() {
  setStatus('구글시트 불러오는 중...', 'warn');
  const out = await callGoogleSheet('loadAll', {});
  state.data = out.data || {};

  rebuildPartSearchIndex();

  renderDashboard();
  setStatus('구글시트 연동 완료 · 품번검색 ' + state.masterRows.length + '건 · ' + new Date().toLocaleTimeString('ko-KR'), '');
}

function renderDashboard() {
  const data = state.data || {};
  const internal = safeArrayKey(data, 'internalDefects.v1').length;
  const external = externalCount(data);
  $('kInternal').textContent = internal;
  $('kExternal').textContent = external;
  $('kTotal').textContent = internal + external;
  $('kParts').textContent = state.masterRows.length;

  const list = allDefects(data).slice(0, 20);
  const el = $('recentList');
  if (!list.length) {
    el.innerHTML = '<div class="empty">데이터 없음</div>';
    return;
  }
  el.innerHTML = list.map(d => {
    const status = d.status || d['처리상태'] || '접수';
    const title = d.defect || d['불량내용'] || '(불량내용 없음)';
    const pn = d.partNo || d['품번'] || '';
    const name = d.itemName || d['품명'] || '';
    const date = d.date || d['발생일자'] || d.createdAt || '';
    return `<div class="defect-card">
      <div class="top">
        <div>
          <div class="title">${escapeHtml(title)}</div>
          <div class="meta">${escapeHtml(pn)} ${name ? '· '+escapeHtml(name) : ''}</div>
          <div class="meta">${escapeHtml(date)} · ${escapeHtml(d._kind || '')}</div>
        </div>
        <span class="badge">${escapeHtml(status)}</span>
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function setKind(kind) {
  state.kind = kind;
  $('kindInternal').classList.toggle('active', kind === 'internal');
  $('kindExternal').classList.toggle('active', kind === 'external');
  $('processField').classList.toggle('hidden', kind !== 'internal');
  $('supplierField').classList.toggle('hidden', kind !== 'external');
  state.selectedPart = null;
  $('selectedPart').style.display = 'none';
  $('partSearch').value = '';
  $('partNo').value = '';
  $('itemName').value = '';
  $('processName').value = '';
  $('supplier').value = '';
  renderSearchResults([]);
}

function renderSearchResults(rows) {
  const box = $('searchResults');
  if (!rows.length) {
    box.style.display = 'none';
    box.innerHTML = '';
    return;
  }
  box.style.display = 'block';
  box.innerHTML = rows.slice(0, 40).map((r, idx) => {
    const sub = [
      r.itemName,
      r.kind === 'internal' ? r.processName : r.supplier,
      r.modelName
    ].filter(Boolean).join(' · ');
    return `<div class="result" data-idx="${idx}">
      <div class="pn">${escapeHtml(r.partNo || '(품번 없음)')}</div>
      <div class="desc">${escapeHtml(sub || '')}</div>
    </div>`;
  }).join('');
  [...box.querySelectorAll('.result')].forEach((node, idx) => {
    node.addEventListener('click', () => selectPart(rows[idx]));
  });
}

function searchParts() {
  const q = $('partSearch').value.trim().toLowerCase();
  if (q.length < 1) {
    renderSearchResults([]);
    return;
  }
  let source = state.kind === 'internal' ? state.internalRows : state.externalRows;
  if (!source.length) source = state.masterRows;
  const rows = source.filter(r => {
    const hay = [r.partNo, r.itemName, r.modelName, r.processName, r.supplier, r.partGroup].join(' ').toLowerCase();
    return hay.includes(q);
  });
  renderSearchResults(rows);
}

function selectPart(row) {
  state.selectedPart = row;
  $('partNo').value = row.partNo || '';
  $('itemName').value = row.itemName || '';
  if (state.kind === 'internal') $('processName').value = row.processName || '';
  if (state.kind === 'external') $('supplier').value = row.supplier || '';
  $('partSearch').value = row.partNo || row.itemName || '';
  renderSearchResults([]);

  const info = [
    row.partNo,
    row.itemName,
    row.kind === 'internal' ? row.processName : row.supplier,
    row.modelName
  ].filter(Boolean).map(escapeHtml).join('<br>');
  $('selectedPart').innerHTML = '<strong>선택 품목</strong>' + info;
  $('selectedPart').style.display = 'block';
}

function resizeImage(file, maxSize=1280, quality=.78) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > maxSize) { h = Math.round(h * maxSize / w); w = maxSize; }
        else if (h >= w && h > maxSize) { w = Math.round(w * maxSize / h); h = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve({ name: file.name || 'photo.jpg', url: dataUrl, size: file.size, type: 'image/jpeg' });
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function addFiles(files) {
  const list = Array.from(files || []).filter(f => /^image\//i.test(f.type));
  if (!list.length) return;
  const available = Math.max(0, 3 - state.photos.length);
  const use = list.slice(0, available);
  if (!use.length) {
    alert('사진은 최대 3장까지 첨부할 수 있습니다.');
    return;
  }
  setStatus('사진 처리 중...', 'warn');
  for (const file of use) {
    const photo = await resizeImage(file);
    state.photos.push(photo);
  }
  renderPhotos();
  setStatus('사진 첨부 완료', '');
}

function renderPhotos() {
  const box = $('previews');
  box.innerHTML = state.photos.map((p, idx) => `<div class="thumb">
    <img src="${p.url}" alt="첨부사진 ${idx+1}">
    <button type="button" data-idx="${idx}">삭제</button>
  </div>`).join('');
  [...box.querySelectorAll('button')].forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = Number(btn.dataset.idx);
      state.photos.splice(idx, 1);
      renderPhotos();
    });
  });
}

function validateForm() {
  const partNo = $('partNo').value.trim();
  const date = $('date').value.trim();
  const worker = $('worker').value.trim();
  const qty = Number($('qty').value || 0);
  const defect = $('defectText').value.trim();

  if (!partNo) return '품번을 입력하세요.';
  if (!date) return '발생일자를 입력하세요.';
  if (!worker) return '작업자/등록자를 입력하세요.';
  if (!qty || qty < 1) return '수량을 1 이상 입력하세요.';
  if (!defect) return '불량내용을 입력하세요.';
  return '';
}

async function submitDefect() {
  const msg = validateForm();
  if (msg) {
    alert(msg);
    return;
  }

  if (!confirm('불량 이력을 등록하시겠습니까?')) return;

  const submit = $('submitBtn');
  submit.disabled = true;
  setStatus('불량 등록 중...', 'warn');

  const isInternal = state.kind === 'internal';
  const defect = {
    partNo: $('partNo').value.trim(),
    itemName: $('itemName').value.trim(),
    date: $('date').value.trim(),
    qty: Number($('qty').value || 1),
    worker: $('worker').value.trim(),
    registrar: $('worker').value.trim(),
    owner: $('worker').value.trim(),
    defect: $('defectText').value.trim(),
    status: '접수',
    cause: $('cause').value.trim(),
    countermeasure: $('countermeasure').value.trim(),
    action: $('countermeasure').value.trim(),
    photos: state.photos,
    source: 'mobile-field-pwa',
    createdAt: new Date().toLocaleString('ko-KR'),
    updatedAt: new Date().toLocaleString('ko-KR')
  };

  if (isInternal) {
    defect.processName = $('processName').value.trim();
    defect.process = $('processName').value.trim();
    defect.partGroup = state.selectedPart ? state.selectedPart.partGroup || '' : '';
  } else {
    defect.supplier = $('supplier').value.trim();
    defect.vendor = $('supplier').value.trim();
  }

  try {
    const out = await callGoogleSheet('appendDefect', {
      kind: state.kind,
      defect,
      registrar: defect.registrar
    });
    setStatus('불량 등록 완료 · ID: ' + (out.id || ''), '');
    alert('불량 등록이 완료되었습니다.');
    resetForm(false);
    await loadAll();
    showTab('dash');
  } catch(e) {
    console.error(e);
    setStatus('등록 실패: ' + e.message, 'err');
    alert('등록 실패\n' + e.message);
  } finally {
    submit.disabled = false;
  }
}

function resetForm(confirmFirst=true) {
  if (confirmFirst && !confirm('입력 내용을 초기화하시겠습니까?')) return;
  state.selectedPart = null;
  state.photos = [];
  ['partSearch','partNo','itemName','processName','supplier','worker','defectText','cause','countermeasure'].forEach(id => $(id).value = '');
  $('qty').value = '1';
  $('date').value = todayYmd();
  $('selectedPart').style.display = 'none';
  renderSearchResults([]);
  renderPhotos();
}

function showTab(tab) {
  const isDash = tab === 'dash';
  $('dashPanel').classList.toggle('hidden', !isDash);
  $('regPanel').classList.toggle('hidden', isDash);
  $('tabDash').classList.toggle('active', isDash);
  $('tabReg').classList.toggle('active', !isDash);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function bind() {
  $('tabDash').addEventListener('click', () => showTab('dash'));
  $('tabReg').addEventListener('click', () => showTab('reg'));
  $('bottomDash').addEventListener('click', () => showTab('dash'));
  $('bottomReg').addEventListener('click', () => showTab('reg'));
  $('refreshBtn').addEventListener('click', () => loadAll().catch(e => {
    setStatus('불러오기 실패: ' + e.message, 'err');
    alert(e.message);
  }));
  $('kindInternal').addEventListener('click', () => setKind('internal'));
  $('kindExternal').addEventListener('click', () => setKind('external'));
  $('partSearch').addEventListener('input', searchParts);
  $('cameraBtn').addEventListener('click', () => $('cameraInput').click());
  $('galleryBtn').addEventListener('click', () => $('galleryInput').click());
  $('cameraInput').addEventListener('change', e => addFiles(e.target.files).finally(() => e.target.value = ''));
  $('galleryInput').addEventListener('change', e => addFiles(e.target.files).finally(() => e.target.value = ''));
  $('submitBtn').addEventListener('click', submitDefect);
  $('resetBtn').addEventListener('click', () => resetForm(true));
}

function init() {
  bind();
  $('date').value = todayYmd();
  setKind('internal');
  loadAll().catch(e => {
    console.error(e);
    setStatus('구글시트 불러오기 실패: ' + e.message, 'err');
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').catch(console.warn);
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
